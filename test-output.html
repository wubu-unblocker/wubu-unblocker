    <script>window.addEventListener('DOMContentLoaded', async () => { // Wait for BareMux to be available
const waitForBareMux = () => {
  return new Promise((resolve) => {
    if (typeof BareMux !== 'undefined') {
      resolve();
      return;
    }
    const check = setInterval(() => {
      if (typeof BareMux !== 'undefined') {
        clearInterval(check);
        resolve();
      }
    }, 50);
    // Fallback timeout
    setTimeout(() => {
      clearInterval(check);
      resolve();
    }, 5000);
  });
};

(async () => {
  console.log('Waiting for BareMux...');
  await waitForBareMux();
  console.log('BareMux available:', typeof BareMux);

  const swRoutes = {
    uv: ['/network/networking.sw.js', '/network/sw-blacklist.js'],
    sj: ['/scram/working.sw.js', '/scram/working.sw-blacklist.js'],
  };
  const swAllowedHostnames = ['localhost', '127.0.0.1'];
  const wispUrl = (location.protocol === 'https:' ? 'wss' : 'ws') + '://' + location.host + '/wisp/';
  const transports = {
    'epoxy': '/epoxy/index.mjs',
    'libcurl': '/libcurl/index.mjs',
  };
  const storageId = 'net-time-storage';
  const storageObject = () => JSON.parse(localStorage.getItem(storageId)) || {};
  const readStorage = (name) => storageObject()[name];
  const defaultMode = 'libcurl';

  transports.default = transports[defaultMode];

  const registerSW = async () => {
    if (!navigator.serviceWorker) {
      if (location.protocol !== 'https:' && !swAllowedHostnames.includes(location.hostname))
        throw new Error('Service workers cannot be registered without https.');
      throw new Error("Your browser doesn't support service workers.");
    }

    const transportMode = transports[readStorage('Transport')] || transports.default;
    let transportOptions = { wisp: wispUrl };

    console.log('Transport mode:', transportMode);
    console.log('Wisp URL:', wispUrl);

    console.log('Creating BareMux connection...');
    try {
      const connection = new BareMux.BareMuxConnection('/baremux/worker.js');
      console.log('BareMux connection created, setting transport...');
      await connection.setTransport(transportMode, [transportOptions]);
      console.log('Transport set successfully!');
    } catch (err) {
      console.error('BareMux connection failed:', err);
      throw err;
    }

    const registrations = await navigator.serviceWorker.getRegistrations();
    const usedSW = swRoutes.uv[readStorage('HideAds') !== false ? 1 : 0];

    console.log('Registering service worker:', usedSW);

    // Unregister outdated service workers
    for (const registration of registrations)
      if (registration.active && new URL(registration.active.scriptURL).pathname !== new URL(usedSW, location.origin).pathname)
        await registration.unregister();

    await navigator.serviceWorker.register(usedSW);
    console.log('Service worker registered');
  };

  try {
    await registerSW();
  } catch (err) {
    console.error('Initialization failed:', err);
  }
})();
 });</script>
