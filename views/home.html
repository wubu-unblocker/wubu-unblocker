<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wubu | Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/wubu.css?v=2">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .hero {
      flex: 1;
      /* Pushes footer down */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .hero-content {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 2;
      /* Ensure above glow */
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 50px;
    }

    .dropdown-content a:hover {
      background: var(--surface-hover);
      color: var(--accent) !important;
    }

    .dropdown-content a.active {
      background: var(--surface);
      color: var(--accent) !important;
      font-weight: 500;
    }
  </style>
  <script>try { if (localStorage.getItem('wubu-theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark') } } catch (e) { }</script>
</head>

<body>
  <nav class="nav">
    <a href="/home" class="nav-brand">
      <i class="fas fa-ghost" style="margin-right: 8px;"></i>Wubu
    </a>
    <div class="nav-links">
      <a href="/home" class="active">Home</a>
      <a href="/games">Games</a>
      <a href="/browsing">Proxies</a>
    </div>
    <div class="nav-actions">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" width="60" height="30" id="themeToggle" style="cursor: pointer; align-self: center;">
  <defs>
    <!-- The Requested Magenta Gradient -->
    <linearGradient id="wubu-grad" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9d4edd" />
      <stop offset="100%" stop-color="#7b2cbf" />
    </linearGradient>

    <!-- Proxy Node Ray (Used for the Sun) -->
    <g id="proxy-node">
      <line x1="40" y1="23" x2="40" y2="13" stroke="url(#wubu-grad)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="40" cy="11" r="3.5" fill="url(#wubu-grad)"/>
    </g>

    <!-- 4-Point Sparkle Star -->
    <path id="sparkle-star" d="M 0 -6 Q 0 0 6 0 Q 0 0 0 6 Q 0 0 -6 0 Q 0 0 0 -6 Z" fill="#ffffff" />

    <!-- Mask to morph Sun Core into Moon -->
    <mask id="moon-mask">
      <circle cx="40" cy="40" r="16" fill="white" />
      <circle id="moon-cutout" cx="40" cy="40" r="16" fill="black" />
    </mask>
  </defs>

  <style>
    /* Base Styles */
    .track {
      fill: #e4e6eb;
      transition: fill 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .light-bg {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .light-bg path, .light-bg line {
      stroke: #c2c7d0;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .dark-bg {
      opacity: 0;
      transform: translateY(15px) scale(0.9);
      transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .knob-group {
      transform: translateX(0);
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .knob-base {
      fill: #ffffff;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    .icon-rotator {
      transform-origin: 40px 40px;
      transform: rotate(0deg);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .node-rays {
      opacity: 1;
      transition: opacity 0.4s ease 0.1s;
    }

    .core-icon {
      fill: url(#wubu-grad);
      transition: fill 0.6s ease;
    }

    #moon-cutout {
      transform: translate(0, -40px);
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* --- TOGGLED STATE (DARK MODE) --- */
    .dark-mode .track {
      fill: url(#wubu-grad);
    }

    .dark-mode .light-bg {
      opacity: 0;
      transform: translateY(-15px) scale(0.9);
    }

    .dark-mode .dark-bg {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .dark-mode .knob-group {
      transform: translateX(80px);
    }

    .dark-mode .icon-rotator {
      transform: rotate(180deg);
    }

    .dark-mode .node-rays {
      opacity: 0;
      transition-delay: 0s;
    }

    .dark-mode .core-icon {
      fill: #0f0f13; /* Inner moon matches dark background */
    }

    .dark-mode #moon-cutout {
      transform: translate(-8px, -8px);
    }
  </style>

  <!-- 1. Background Track -->
  <rect class="track" width="160" height="80" rx="40" />

  <!-- 2. Light Mode Proxy Web Background -->
  <g class="light-bg">
    <path d="M 85 20 Q 115 40 145 20" fill="none" />
    <path d="M 85 60 Q 115 40 145 60" fill="none" />
    <line x1="115" y1="25" x2="115" y2="55" />
    <circle cx="85" cy="20" r="2.5" fill="#c2c7d0"/>
    <circle cx="145" cy="20" r="2.5" fill="#c2c7d0"/>
    <circle cx="115" cy="40" r="3.5" fill="#c2c7d0"/>
    <circle cx="85" cy="60" r="2.5" fill="#c2c7d0"/>
    <circle cx="145" cy="60" r="2.5" fill="#c2c7d0"/>
  </g>

  <!-- 3. Dark Mode "Wubu" Constellation Background -->
  <g class="dark-bg">
    <path d="M 20 30 L 35 55 L 50 35 L 65 55 L 80 30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="3 3" />
    <use href="#sparkle-star" x="20" y="30" transform="scale(0.8) translate(5, 7.5)" />
    <use href="#sparkle-star" x="35" y="55" />
    <use href="#sparkle-star" x="50" y="35" transform="scale(0.6) translate(33, 23)" />
    <use href="#sparkle-star" x="65" y="55" />
    <use href="#sparkle-star" x="80" y="30" transform="scale(1.2) translate(-13, -5)" />
  </g>

  <!-- 4. Sliding Knob -->
  <g class="knob-group">
    <circle class="knob-base" cx="40" cy="40" r="34" />
    
    <g class="icon-rotator">
      <g class="node-rays">
        <use href="#proxy-node" />
        <use href="#proxy-node" transform="rotate(45 40 40)" />
        <use href="#proxy-node" transform="rotate(90 40 40)" />
        <use href="#proxy-node" transform="rotate(135 40 40)" />
        <use href="#proxy-node" transform="rotate(180 40 40)" />
        <use href="#proxy-node" transform="rotate(225 40 40)" />
        <use href="#proxy-node" transform="rotate(270 40 40)" />
        <use href="#proxy-node" transform="rotate(315 40 40)" />
      </g>
      <circle class="core-icon" cx="40" cy="40" r="16" mask="url(#moon-mask)" />
    </g>
  </g>
</svg>
      <div class="dropdown" style="position: relative; display: inline-block;">
        <button class="nav-icon" id="moreDocsBtn" title="More">
          <i class="fas fa-ellipsis-v"></i>
        </button>
        <div id="moreDropdown" class="dropdown-content"
          style="display: none; position: absolute; right: 0; background: var(--nav-bg); min-width: 160px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border-radius: 12px; border: 1px solid var(--border); padding: 8px; z-index: 100;">
          <a href="/blooket"
            style="display: block; padding: 12px 15px; text-decoration: none; color: var(--text-main); border-radius: 8px; margin-bottom: 4px; transition: background 0.2s;"><i
              class="fas fa-bolt"
              style="width: 20px; text-align: center; margin-right: 8px; color: var(--text-secondary);"></i>Blooket</a>
          <a href="/docs"
            style="display: block; padding: 12px 15px; text-decoration: none; color: var(--text-main); border-radius: 8px; margin-bottom: 4px; transition: background 0.2s;"><i
              class="fas fa-book"
              style="width: 20px; text-align: center; margin-right: 8px; color: var(--text-secondary);"></i>Docs</a>
          <a href="/issues"
            style="display: block; padding: 12px 15px; text-decoration: none; color: var(--text-main); border-radius: 8px; transition: background 0.2s;"><i
              class="fas fa-bug"
              style="width: 20px; text-align: center; margin-right: 8px; color: var(--text-secondary);"></i>Issues</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-content">
      <h1>Browse <span class="accent">freely</span></h1>
      <p class="hero-subtitle">Access websites, games, and apps without restrictions</p>

      <div class="cards-grid">
        <a href="/browsing" class="card">
          <div class="card-icon"><i class="fas fa-globe"></i></div>
          <h3>Web Proxies</h3>
          <p>Unblock any website with our proxy collection</p>
        </a>

        <a href="/games" class="card">
          <div class="card-icon"><i class="fas fa-gamepad"></i></div>
          <h3>Games</h3>
          <p>Explore our library of unblocked games</p>
        </a>

        <a href="/blooket" class="card">
          <div class="card-icon"><i class="fas fa-bolt"></i></div>
          <h3>Blooket</h3>
          <p>Enhanced Blooket experience</p>
        </a>
      </div>
    </div>
  </div>

  <div class="footer">
    Wubu &copy; 2026
  </div>

  

<script>
    if(!window.wubuThemeSetup) {
        window.wubuThemeSetup = true;
        const root = document.documentElement;
        
        function applyTheme(theme) {
            if (theme === 'dark') {
                root.setAttribute('data-theme', 'dark');
            } else {
                root.removeAttribute('data-theme');
            }
            localStorage.setItem('wubu-theme', theme);
            
            // Update all toggle buttons on page
            document.querySelectorAll('#themeToggle').forEach(btn => {
                btn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }
        
        const currentTheme = localStorage.getItem('wubu-theme') || 'light';
        applyTheme(currentTheme);
        
        // Listeners for all theme buttons
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('#themeToggle');
            if(btn) {
                const isDark = root.hasAttribute('data-theme');
                applyTheme(isDark ? 'light' : 'dark');
            }
        });

        // Dropdown toggle globally
        document.addEventListener('click', (e) => {
            const moreBtn = e.target.closest('#moreDocsBtn');
            const dropdown = document.getElementById('moreDropdown');
            if(moreBtn && dropdown) {
                e.preventDefault();
                e.stopPropagation();
                if(dropdown.style.display === 'block') {
                    dropdown.style.opacity = '0';
                    setTimeout(() => dropdown.style.display = 'none', 200);
                } else {
                    dropdown.style.display = 'block';
                    dropdown.style.opacity = '1';
                }
            } else if(dropdown && dropdown.style.display === 'block' && !e.target.closest('#moreDropdown')) {
                dropdown.style.opacity = '0';
                setTimeout(() => dropdown.style.display = 'none', 200);
            }
        });
    }
</script>
</body>

</html>
