<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wubu | Unblocker</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/wubu.css?v=2">

  <!-- Scripts -->
  <script src="/assets/js/dashboard.js" defer></script>
</head>

<body>

  <nav class="nav">
    <a href="/" class="nav-brand">
      <i class="fas fa-ghost"></i>
      Wubu
    </a>
    <div class="nav-links">
      <a href="/stuff">Browse</a>
      <a href="/blooket">Blooket</a>
    </div>
    <div class="nav-actions">
      <button class="nav-icon" id="themeToggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-content">
      <h1>Explore <span class="accent">Freely</span></h1>
      <p class="hero-subtitle">Access websites, games, and apps without restrictions</p>

      <div class="search-box" style="margin: 0 auto 50px;">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="proxyInput" placeholder="Search the web..." autofocus>
        <button class="search-btn" id="goBtn">Go</button>
      </div>

      <div class="quick-links">
        <a href="#" class="quick-link" onclick="quickLink('https://youtube.com')">
          <i class="fab fa-youtube" style="color: #ef4444;"></i>
          <span>YouTube</span>
        </a>
        <a href="#" class="quick-link" onclick="quickLink('https://discord.com')">
          <i class="fab fa-discord" style="color: #5865f2;"></i>
          <span>Discord</span>
        </a>
        <a href="#" class="quick-link" onclick="quickLink('https://tiktok.com')">
          <i class="fab fa-tiktok" style="color: #334155;"></i>
          <span>TikTok</span>
        </a>
        <a href="#" class="quick-link" onclick="quickLink('https://reddit.com')">
          <i class="fab fa-reddit" style="color: #f97316;"></i>
          <span>Reddit</span>
        </a>
      </div>
    </div>
  </div>

  <div class="footer">
    Wubu &copy; 2026 &bull; <a href="/stuff" style="color: var(--accent); text-decoration: none;">Browse All</a>
  </div>

  <script>
    // Theme toggle logic
    const themeToggle = document.getElementById('themeToggle');
    const root = document.documentElement;
    const body = document.body;

    function applyTheme(theme) {
      if (theme === 'dark') {
        root.setAttribute('data-theme', 'dark');
        themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
      } else {
        root.removeAttribute('data-theme');
        themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
      }
      localStorage.setItem('wubu-theme', theme);
    }

    // Load initial theme (default light)
    const currentTheme = localStorage.getItem('wubu-theme') || 'light';
    applyTheme(currentTheme);

    themeToggle.addEventListener('click', () => {
      const isDark = root.hasAttribute('data-theme');
      applyTheme(isDark ? 'light' : 'dark');
    });
  </script>
</body>

</html>
