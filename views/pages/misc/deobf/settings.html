<div class="settings-content">

  <div class="settings-content-body">
    <div class="csel-container-left">
      <p class="cseltitle">{{mask}}{{Tab Appearance}}</p>
      <p style="margin: 0 0 10px; color: var(--text-secondary);">
        Change your tab title and icon.
      </p>

      <div class="cloakform" style="flex-direction: column; align-items: stretch;">
        <div style="display:flex; gap:10px; flex-wrap: wrap;">
          <input type="button" id="cloak-clever" value="Set To Clever" />
          <input type="button" id="cloak-reset" value="Reset" />
        </div>
      </div>

      <p class="cseltitle">{{mask}}{{Custom Title}}</p>
      <form id="titleform" class="cloakform">
        <input type="text" placeholder="Enter a tab title..." spellcheck="false" />
        <input type="submit" value="Apply" />
      </form>

      <p class="cseltitle">{{mask}}{{Custom Icon URL}}</p>
      <form id="iconform" class="cloakform">
        <input type="text" placeholder="Enter an icon URL..." spellcheck="false" />
        <input type="submit" value="Apply" />
      </form>

      <p class="cseltitle">{{mask}}{{Preset Icons}}</p>
      <select id="icon-list">
        <option><!-- Leave this blank to avoid a bug. --></option>
        <option>Clever</option>
        <option>{{Google}}</option>
        <option>{{Bing}}</option>
        <option>{{Google}} Drive</option>
        <option>Gmail</option>
      </select>

      <a href="{{route}}{{/questions}}">{{mask}}{{Find Icon URL}}</a>

      <details style="margin-top: 14px;">
        <summary style="cursor:pointer; font-weight:700;">Advanced</summary>
        <div style="margin-top: 12px;">
          <p class="cseltitle">{{mask}}{{Wisp Protocol Transport}}</p>
          <div class="radio-group {{wisp-transport}}-list">
            <label>
              <p>{{mask}}{{Libcurl}}</p>
              <input type="radio" name="{{wisp-transport}}" value="{{libcurl}}" checked />
            </label>
            <label>
              <p>{{mask}}{{Epoxy}}</p>
              <input type="radio" name="{{wisp-transport}}" value="{{epoxy}}" />
            </label>
          </div>

          <p class="cseltitle">Search Engine</p>
          <select class="search-engine-list">
            <option>{{DuckDuckGo}}</option>
            <option>{{Google}}</option>
            <option>{{Bing}}</option>
            <option>{{Brave}}</option>
            <option>{{Startpage}}</option>
          </select>

          <p class="cseltitle">Theme</p>
          <div class="radio-group theme-list">
            <label>
              <p>Light</p>
              <input type="radio" name="theme" value="light" />
            </label>
            <label>
              <p>Dark</p>
              <input type="radio" name="theme" value="dark" checked />
            </label>
          </div>

          <div class="radio-group" style="margin-top: 10px;">
            <label>
              <p>Hide Ads</p>
              <input type="checkbox" class="switch hideads" checked />
            </label>
            <label>
              <p>{{mask}}{{Enable Tor}}</p>
              <input type="checkbox" class="switch useonion" />
            </label>
            <label>
              <p>Enable Autocomplete</p>
              <input type="checkbox" class="switch useac" checked />
            </label>
            <label>
              <p>Public Wisp Fallback</p>
              <input type="checkbox" class="switch usepublicwisp" checked />
            </label>
          </div>
        </div>
      </details>
    </div>
    <!-- Right column removed for simplicity -->
  </div>
</div>
