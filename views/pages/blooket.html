    <style>
        /* Override specific Blooket page layouts while keeping dashboard theme */
        body { flex-direction: column; overflow: hidden; display: flex; height: 100vh; margin: 0; background: var(--bg); color: var(--text-main); }

        .header {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: rgba(15, 18, 25, 0.95);
            border-bottom: 1px solid var(--glass-border);
            gap: 15px;
            z-index: 50;
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 10px;
                gap: 8px;
            }

            .action-btn span {
                display: none;
            }
        }

        .stream-container {
            flex: 1;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #stream {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Dashboard-like buttons */
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .action-btn.primary {
            background: var(--accent-color, #6366f1);
            border: none;
        }

        .url-bar {
            flex: 1;
            max-width: 600px;
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 4px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            align-items: center;
        }

        .url-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-family: inherit;
            padding: 4px;
        }

        .status-overlay {
            position: absolute;
            background: rgba(20, 20, 30, 0.9);
            padding: 20px 40px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--accent-color, #6366f1);
            z-index: 10;
        }

        .glass {
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .hidden {
            display: none !important;
        }
    </style>
<script>try{if(localStorage.getItem('wubu-theme')==='dark'){document.documentElement.setAttribute('data-theme', 'dark')}}catch(e){}</script>

  <defs>
    <!-- The Requested Magenta Gradient -->
    <linearGradient id="wubu-grad" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9d4edd" />
      <stop offset="100%" stop-color="#7b2cbf" />

    <!-- Proxy Node Ray (Used for the Sun) -->
    <g id="proxy-node">
      <line x1="40" y1="23" x2="40" y2="13" stroke="url(#wubu-grad)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="40" cy="11" r="3.5" fill="url(#wubu-grad)"/>

    <!-- 4-Point Sparkle Star -->
    <path id="sparkle-star" d="M 0 -6 Q 0 0 6 0 Q 0 0 0 6 Q 0 0 -6 0 Q 0 0 0 -6 Z" fill="#ffffff" />

    <!-- Mask to morph Sun Core into Moon -->
    <mask id="moon-mask">
      <circle cx="40" cy="40" r="16" fill="white" />
      <circle id="moon-cutout" cx="40" cy="40" r="16" fill="black" />

  </defs>

  <style>
    /* Base Styles */
    .track {
      fill: #e4e6eb;
      transition: fill 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .light-bg {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .light-bg path, .light-bg line {
      stroke: #c2c7d0;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .dark-bg {
      opacity: 0;
      transform: translateY(15px) scale(0.9);
      transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .knob-group {
      transform: translateX(0);
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .knob-base {
      fill: #ffffff;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    .icon-rotator {
      transform-origin: 40px 40px;
      transform: rotate(0deg);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .node-rays {
      opacity: 1;
      transition: opacity 0.4s ease 0.1s;
    }

    .core-icon {
      fill: url(#wubu-grad);
      transition: fill 0.6s ease;
    }

    #moon-cutout {
      transform: translate(0, -40px);
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* --- TOGGLED STATE (DARK MODE) --- */
    .dark-mode .track {
      fill: url(#wubu-grad);
    }

    .dark-mode .light-bg {
      opacity: 0;
      transform: translateY(-15px) scale(0.9);
    }

    .dark-mode .dark-bg {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .dark-mode .knob-group {
      transform: translateX(80px);
    }

    .dark-mode .icon-rotator {
      transform: rotate(180deg);
    }

    .dark-mode .node-rays {
      opacity: 0;
      transition-delay: 0s;
    }

    .dark-mode .core-icon {
      fill: #0f0f13; /* Inner moon matches dark background */
    }

    .dark-mode #moon-cutout {
      transform: translate(-8px, -8px);
    }
  </style>

  <!-- 1. Background Track -->
  <rect class="track" width="160" height="80" rx="40" />

  <!-- 2. Light Mode Proxy Web Background -->
  <g class="light-bg">
    <path d="M 85 20 Q 115 40 145 20" fill="none" />
    <path d="M 85 60 Q 115 40 145 60" fill="none" />
    <line x1="115" y1="25" x2="115" y2="55" />
    <circle cx="85" cy="20" r="2.5" fill="#c2c7d0"/>
    <circle cx="145" cy="20" r="2.5" fill="#c2c7d0"/>
    <circle cx="115" cy="40" r="3.5" fill="#c2c7d0"/>
    <circle cx="85" cy="60" r="2.5" fill="#c2c7d0"/>
    <circle cx="145" cy="60" r="2.5" fill="#c2c7d0"/>
  </g>

  <!-- 3. Dark Mode "Wubu" Constellation Background -->
  <g class="dark-bg">
    <path d="M 20 30 L 35 55 L 50 35 L 65 55 L 80 30" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="3 3" />
    <use href="#sparkle-star" x="20" y="30" transform="scale(0.8) translate(5, 7.5)" />
    <use href="#sparkle-star" x="35" y="55" />
    <use href="#sparkle-star" x="50" y="35" transform="scale(0.6) translate(33, 23)" />
    <use href="#sparkle-star" x="65" y="55" />
    <use href="#sparkle-star" x="80" y="30" transform="scale(1.2) translate(-13, -5)" />
  </g>

  <!-- 4. Sliding Knob -->
  <g class="knob-group">
    <circle class="knob-base" cx="40" cy="40" r="34" />
    
    <g class="icon-rotator">
      <g class="node-rays">
        <use href="#proxy-node" />
        <use href="#proxy-node" transform="rotate(45 40 40)" />
        <use href="#proxy-node" transform="rotate(90 40 40)" />
        <use href="#proxy-node" transform="rotate(135 40 40)" />
        <use href="#proxy-node" transform="rotate(180 40 40)" />
        <use href="#proxy-node" transform="rotate(225 40 40)" />
        <use href="#proxy-node" transform="rotate(270 40 40)" />
        <use href="#proxy-node" transform="rotate(315 40 40)" />
      </g>
      <circle class="core-icon" cx="40" cy="40" r="16" mask="url(#moon-mask)" />
    </g>
  </g>
</svg>
            <div class="dropdown" style="position: relative; display: inline-block;">
                <button class="nav-icon" id="moreDocsBtn" title="More">

                <div id="moreDropdown" class="dropdown-content" style="display: none; position: absolute; right: 0; background: var(--nav-bg); min-width: 160px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border-radius: 12px; border: 1px solid var(--border); padding: 8px; z-index: 100;">
                    <a href="/blooket" class="active" style="display: block; padding: 12px 15px; text-decoration: none; color: var(--text-main); border-radius: 8px; margin-bottom: 4px; transition: background 0.2s;"><i class="fas fa-bolt" style="width: 20px; text-align: center; margin-right: 8px; color: var(--text-secondary);"></i>Blooket</a>
                    <a href="/docs" style="display: block; padding: 12px 15px; text-decoration: none; color: var(--text-main); border-radius: 8px; margin-bottom: 4px; transition: background 0.2s;"><i class="fas fa-book" style="width: 20px; text-align: center; margin-right: 8px; color: var(--text-secondary);"></i>Docs</a>
                    <a href="/issues" style="display: block; padding: 12px 15px; text-decoration: none; color: var(--text-main); border-radius: 8px; transition: background 0.2s;"><i class="fas fa-bug" style="width: 20px; text-align: center; margin-right: 8px; color: var(--text-secondary);"></i>Issues</a>

    <div class="stream-container" id="streamContainer" tabindex="0" style="background:var(--bg)">
        <div class="status-overlay" id="status">
            <h3>Connecting...</h3>
            <p>Starting remote browser...</p>
        </div>
        <img id="stream" src="" draggable="false" alt="Stream">
    </div>

    <!-- Paste Modal (Hidden by default) -->
    <div id="pasteModal" class="hidden glass"
        style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); padding:20px; width:300px; border-radius:12px; z-index:100;">
        <h3 style="margin-bottom:10px; margin-top:0;">Paste Text</h3>
        <textarea id="pasteText"
            style="width:100%; height:100px; background:rgba(0,0,0,0.3); color:white; border:1px solid #444; border-radius:6px; padding:8px; font-family:inherit; resize: none;"></textarea>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
            <button class="action-btn" onclick="closePasteModal()">Cancel</button>
            <button class="action-btn primary" onclick="sendText()">Send</button>
        </div>
    </div>

    <script>
        // Logic ported from content
        const stream = document.getElementById('stream');
        const streamContainer = document.getElementById('streamContainer');
        const status = document.getElementById('status');
        const urlInput = document.getElementById('urlInput');
        let ws = null;

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/blooket-ws`);

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'frame') {
                    stream.src = 'data:image/jpeg;base64,' + msg.data;
                    status.classList.add('hidden');
                } else if (msg.type === 'ready') status.classList.add('hidden');
                else if (msg.type === 'error') {
                    status.innerHTML = `<h3>Error</h3><p>${msg.message}</p>`;
                    status.classList.remove('hidden');
                }
            };
            ws.onclose = () => {
                status.innerHTML = '<h3>Disconnected</h3><p>Reconnecting...</p>';
                status.classList.remove('hidden');
                setTimeout(connect, 2000);
            };
        }

        function send(data) { if (ws && ws.readyState == 1) ws.send(JSON.stringify(data)); }
        function navigate() { send({ type: 'navigate', url: urlInput.value }); }
        function injectCheats() { send({ type: 'injectCheats' }); }
        function toggleGUI() { send({ type: 'toggleCheats' }); }
        function toggleFullscreen() {
            if (!document.fullscreenElement) streamContainer.requestFullscreen();
            else document.exitFullscreen();
        }

        // Input Mappings
        function getkCoords(e) {
            const rect = stream.getBoundingClientRect();

            // Use actual streamed dimensions
            const naturalWidth = stream.naturalWidth || 1280;
            const naturalHeight = stream.naturalHeight || 720;

            const elementWidth = rect.width;
            const elementHeight = rect.height;

            const imageRatio = naturalWidth / naturalHeight;
            const elementRatio = elementWidth / elementHeight;

            let displayedWidth, displayedHeight, offsetX, offsetY;

            if (elementRatio > imageRatio) {
                // Pillarboxed (bars on sides)
                displayedHeight = elementHeight;
                displayedWidth = elementHeight * imageRatio;
                offsetX = (elementWidth - displayedWidth) / 2;
                offsetY = 0;
            } else {
                // Letterboxed (bars on top/bottom)
                displayedWidth = elementWidth;
                displayedHeight = elementWidth / imageRatio;
                offsetX = 0;
                offsetY = (elementHeight - displayedHeight) / 2;
            }

            // Calculate active image click position
            const clickX = e.clientX - rect.left - offsetX;
            const clickY = e.clientY - rect.top - offsetY;

            // Scale to native viewport
            const finalX = (clickX / displayedWidth) * naturalWidth;
            const finalY = (clickY / displayedHeight) * naturalHeight;

            return { x: Math.round(finalX), y: Math.round(finalY) };
        }

        // Improve Navigation
        function navigate() {
            let url = urlInput.value;
            // Intelligent protocol adding
            if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            send({ type: 'navigate', url });
        }

        // Allow Enter key in input
        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigate();
        });

        streamContainer.addEventListener('mousedown', e => {
            const coords = getkCoords(e);
            send({ type: 'mousedown', x: coords.x, y: coords.y, button: e.button == 2 ? 'right' : 'left' });
        });
        streamContainer.addEventListener('mouseup', e => {
            const coords = getkCoords(e);
            send({ type: 'mouseup', x: coords.x, y: coords.y, button: e.button == 2 ? 'right' : 'left' });
        });
        streamContainer.addEventListener('mousemove', e => {
            const coords = getkCoords(e);
            send({ type: 'mousemove', x: coords.x, y: coords.y });
        });
        document.addEventListener('keydown', e => {
            if (document.activeElement === urlInput || document.activeElement.tagName === 'TEXTAREA') return;
            const keys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'Backspace', 'Enter'];
            if (keys.includes(e.key)) e.preventDefault();
            send({ type: 'keydown', key: e.key, keyCode: e.keyCode });
        });

        // Paste Modal
        function showPasteModal() { document.getElementById('pasteModal').classList.remove('hidden'); }
        function closePasteModal() { document.getElementById('pasteModal').classList.add('hidden'); }
        function sendText() {
            const t = document.getElementById('pasteText').value;
            for (let char of t) send({ type: 'keydown', key: char, keyCode: char.charCodeAt(0) });
            closePasteModal();
        }

        connect();
    </script>

    
    

<script>
    if(!window.wubuThemeSetup) {
        window.wubuThemeSetup = true;
        const root = document.documentElement;
        
        function applyTheme(theme) {
            if (theme === 'dark') {
                root.setAttribute('data-theme', 'dark');
            } else {
                root.removeAttribute('data-theme');
            }
            localStorage.setItem('wubu-theme', theme);
            
            // Update all toggle buttons on page
            document.querySelectorAll('#themeToggle').forEach(btn => {
                btn.innerHTML = theme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }
        
        const currentTheme = localStorage.getItem('wubu-theme') || 'light';
        applyTheme(currentTheme);
        
        // Listeners for all theme buttons
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('#themeToggle');
            if(btn) {
                const isDark = root.hasAttribute('data-theme');
                applyTheme(isDark ? 'light' : 'dark');
            }
        });

        // Dropdown toggle globally
        document.addEventListener('click', (e) => {
            const moreBtn = e.target.closest('#moreDocsBtn');
            const dropdown = document.getElementById('moreDropdown');
            if(moreBtn && dropdown) {
                e.preventDefault();
                e.stopPropagation();
                if(dropdown.style.display === 'block') {
                    dropdown.style.opacity = '0';
                    setTimeout(() => dropdown.style.display = 'none', 200);
                } else {
                    dropdown.style.display = 'block';
                    dropdown.style.opacity = '1';
                }
            } else if(dropdown && dropdown.style.display === 'block' && !e.target.closest('#moreDropdown')) {
                dropdown.style.opacity = '0';
                setTimeout(() => dropdown.style.display = 'none', 200);
            }
        });
    }
</script>
