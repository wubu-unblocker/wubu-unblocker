<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blooket Proxy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/wubu.css">
    <style>
        /* Override specific Blooket page layouts while keeping dashboard theme */
        body {
            flex-direction: column;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: #0f1219;
            color: #fff;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .header {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: rgba(15, 18, 25, 0.95);
            border-bottom: 1px solid var(--glass-border);
            gap: 15px;
            z-index: 50;
        }

        @media (max-width: 768px) {
            .header {
                padding: 0 10px;
                gap: 8px;
            }

            .action-btn span {
                display: none;
            }
        }

        .stream-container {
            flex: 1;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #stream {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Dashboard-like buttons */
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .action-btn.primary {
            background: var(--accent-color, #6366f1);
            border: none;
        }

        .url-bar {
            flex: 1;
            max-width: 600px;
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 4px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            align-items: center;
        }

        .url-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-family: inherit;
            padding: 4px;
        }

        .status-overlay {
            position: absolute;
            background: rgba(20, 20, 30, 0.9);
            padding: 20px 40px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--accent-color, #6366f1);
            z-index: 10;
        }

        .glass {
            background: rgba(30, 30, 40, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="/" class="action-btn"><i class="fas fa-arrow-left"></i> <span>Home</span></a>
        <div style="font-weight:bold; font-size:1.1rem; white-space:nowrap;">Blooket Proxy</div>

        <div class="url-bar">
            <input type="text" id="urlInput" value="https://play.blooket.com/" placeholder="Enter URL...">
        </div>
        <button class="action-btn" onclick="navigate()"><i class="fas fa-play"></i> <span>Go</span></button>

        <div style="flex:1"></div>

        <button class="action-btn" onclick="showPasteModal()"><i class="fas fa-paste"></i> <span>Paste</span></button>
        <button class="action-btn primary" onclick="injectCheats()"><i class="fas fa-magic"></i>
            <span>Cheats</span></button>
        <button class="action-btn" onclick="toggleGUI()"><i class="fas fa-eye"></i> <span>GUI</span></button>
        <button class="action-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
    </div>

    <div class="stream-container" id="streamContainer" tabindex="0">
        <div class="status-overlay" id="status">
            <h3>Connecting...</h3>
            <p>Starting remote browser...</p>
        </div>
        <img id="stream" src="" draggable="false" alt="Stream">
    </div>

    <!-- Paste Modal (Hidden by default) -->
    <div id="pasteModal" class="hidden glass"
        style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); padding:20px; width:300px; border-radius:12px; z-index:100;">
        <h3 style="margin-bottom:10px; margin-top:0;">Paste Text</h3>
        <textarea id="pasteText"
            style="width:100%; height:100px; background:rgba(0,0,0,0.3); color:white; border:1px solid #444; border-radius:6px; padding:8px; font-family:inherit; resize: none;"></textarea>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
            <button class="action-btn" onclick="closePasteModal()">Cancel</button>
            <button class="action-btn primary" onclick="sendText()">Send</button>
        </div>
    </div>

    <script>
        // Logic ported from content
        const stream = document.getElementById('stream');
        const streamContainer = document.getElementById('streamContainer');
        const status = document.getElementById('status');
        const urlInput = document.getElementById('urlInput');
        let ws = null;

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/blooket-ws`);

            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'frame') {
                    stream.src = 'data:image/jpeg;base64,' + msg.data;
                    status.classList.add('hidden');
                } else if (msg.type === 'ready') status.classList.add('hidden');
                else if (msg.type === 'error') {
                    status.innerHTML = `<h3>Error</h3><p>${msg.message}</p>`;
                    status.classList.remove('hidden');
                }
            };
            ws.onclose = () => {
                status.innerHTML = '<h3>Disconnected</h3><p>Reconnecting...</p>';
                status.classList.remove('hidden');
                setTimeout(connect, 2000);
            };
        }

        function send(data) { if (ws && ws.readyState == 1) ws.send(JSON.stringify(data)); }
        function navigate() { send({ type: 'navigate', url: urlInput.value }); }
        function injectCheats() { send({ type: 'injectCheats' }); }
        function toggleGUI() { send({ type: 'toggleCheats' }); }
        function toggleFullscreen() {
            if (!document.fullscreenElement) streamContainer.requestFullscreen();
            else document.exitFullscreen();
        }

        // Input Mappings
        function getkCoords(e) {
            const rect = stream.getBoundingClientRect();

            // Hardcoded viewport size from server
            const naturalWidth = 1920;
            const naturalHeight = 1080;

            const elementWidth = rect.width;
            const elementHeight = rect.height;

            const imageRatio = naturalWidth / naturalHeight;
            const elementRatio = elementWidth / elementHeight;

            let displayedWidth, displayedHeight, offsetX, offsetY;

            if (elementRatio > imageRatio) {
                // Pillarboxed (bars on sides)
                displayedHeight = elementHeight;
                displayedWidth = elementHeight * imageRatio;
                offsetX = (elementWidth - displayedWidth) / 2;
                offsetY = 0;
            } else {
                // Letterboxed (bars on top/bottom)
                displayedWidth = elementWidth;
                displayedHeight = elementWidth / imageRatio;
                offsetX = 0;
                offsetY = (elementHeight - displayedHeight) / 2;
            }

            // Calculate active image click position
            const clickX = e.clientX - rect.left - offsetX;
            const clickY = e.clientY - rect.top - offsetY;

            // Scale to native viewport
            const finalX = (clickX / displayedWidth) * naturalWidth;
            const finalY = (clickY / displayedHeight) * naturalHeight;

            return { x: Math.round(finalX), y: Math.round(finalY) };
        }

        // Improve Navigation
        function navigate() {
            let url = urlInput.value;
            // Intelligent protocol adding
            if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            send({ type: 'navigate', url });
        }

        // Allow Enter key in input
        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') navigate();
        });

        streamContainer.addEventListener('mousedown', e => {
            const coords = getkCoords(e);
            send({ type: 'mousedown', x: coords.x, y: coords.y, button: e.button == 2 ? 'right' : 'left' });
        });
        streamContainer.addEventListener('mouseup', e => {
            const coords = getkCoords(e);
            send({ type: 'mouseup', x: coords.x, y: coords.y, button: e.button == 2 ? 'right' : 'left' });
        });
        streamContainer.addEventListener('mousemove', e => {
            const coords = getkCoords(e);
            send({ type: 'mousemove', x: coords.x, y: coords.y });
        });
        document.addEventListener('keydown', e => {
            if (document.activeElement === urlInput || document.activeElement.tagName === 'TEXTAREA') return;
            const keys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space', 'Backspace', 'Enter'];
            if (keys.includes(e.key)) e.preventDefault();
            send({ type: 'keydown', key: e.key, keyCode: e.keyCode });
        });

        // Paste Modal
        function showPasteModal() { document.getElementById('pasteModal').classList.remove('hidden'); }
        function closePasteModal() { document.getElementById('pasteModal').classList.add('hidden'); }
        function sendText() {
            const t = document.getElementById('pasteText').value;
            for (let char of t) send({ type: 'keydown', key: char, keyCode: char.charCodeAt(0) });
            closePasteModal();
        }

        connect();
    </script>
</body>

</html>
